name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check fasal tests
      - name: Test
        run: pytest --cov=fasal --cov-report=term-missing
      # Deep-model tests are skipped unless torch is installed (the `deep` extra).
      # A separate optional job can `pip install -e ".[dev,deep]"` to exercise them.
