# Light local infrastructure for the FUTURE data layer (docs/02-system-architecture.md).
# The backend runs WITHOUT these services (SQLite + local filesystem defaults). Bring them up
# when wiring the Postgres/PostGIS + S3/MinIO adapters.
#
#   docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: fasal
      POSTGRES_PASSWORD: fasal
      POSTGRES_DB: fasal
    ports:
      - "5432:5432"
    volumes:
      - fasal_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fasal
      MINIO_ROOT_PASSWORD: fasalminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fasal_minio:/data

volumes:
  fasal_pg:
  fasal_minio:
